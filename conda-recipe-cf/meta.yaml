{% set version = "0.5.0dev0" %}
{% set buildnumber = 0 %}

package:
    name: mkl_umath
    version: {{ version }}

source:
    path: ../

build:
    number: {{ buildnumber }}
    ignore_run_exports:
      - blas

requirements:
    build:
      - {{ compiler('c') }}
      - {{ compiler('cxx') }}
      - {{ stdlib('c') }}
      - {{ compiler('dpcpp') }} >=2024.2  # [not osx]
    host:
      - meson-python >=0.13.0
      - meson
      - pkg-config
      - ninja
      - git
      - cython
      - python
      - python-gil     # [py>=314]
      - python-build
      - mkl-devel
      - numpy  # [not win]
      - numpy <2.4  # [win]
      # TODO: remove win numpy pin when numpy 2.5 is released, see https://github.com/numpy/numpy/issues/31337
      - llvm-openmp
      - wheel  >=0.41.3
    run:
      - python
      - python-gil     # [py>=314]
      - {{ pin_compatible('mkl') }}
      - {{ pin_compatible('numpy') }}
      - {{ pin_compatible('intel-cmplr-lib-rt') }}

test:
    requires:
      - pip
      - pytest
    source_files:
      - mkl_umath/tests/test_basic.py
    commands:
      - pip check
      - pytest mkl_umath/tests/test_basic.py
    imports:
      - mkl_umath
      - mkl_umath._ufuncs
      - mkl_umath._patch_numpy

about:
    home: http://github.com/IntelPython/mkl_umath
    license: BSD-3
    license_file: LICENSE.txt
    summary: Universal functions for real and complex floating point arrays powered by Intel(R) Math Kernel Library Vector (Intel(R) MKL) and Intel(R) Short Vector Math Library (Intel(R) SVML)
